# LLVM toolchain (clang/lld, same major LLVM version as rustc) with
# cross-language (Rust + FSP C) LTO. Selected via `include` in
# `.cargo/config.toml`. Self-contained: env + linker rustflags live here.
# NOTE: the application constants below are duplicated in env.gcc.toml; keep
# them in sync.

[env]
# C is compiled by clang; cc-rs adds --target=thumbv7em-none-eabihf and the arch
# flags. `-flto` makes the FSP objects LLVM bitcode for cross-language LTO.
CC = "clang"
# llvm-ar archives bitcode members (and indexes them); llvm-link merges the FSP
# bitcode into one module (see RA_FSP_SYS_LTO handling in ra-fsp-sys build.rs).
AR = "llvm-ar"
LD = "ld.lld"
# Tell ra-fsp-sys to combine the FSP bitcode with llvm-link instead of `ld -r`
# (bfd cannot merge LLVM IR).
RA_FSP_SYS_LTO = "1"

FSP_PATH = "/home/ddystopia/job/fw-micrortu/dep/fsp"
CMSIS_PATH = "/home/ddystopia/job/fw-micrortu/dep/cmsis5"
FSP_CFG = "/home/ddystopia/code/ra6m3-rtic/fsp_cfg"
BINDGEN_EXTRA_CLANG_ARGS = "--target=thumbv7em-none-eabihf --sysroot=/opt/arm-none-eabi-gcc-11.2.0/arm-bare_newlib_cortex_m4f_nommu-eabihf"

# --sysroot (clang form) instead of gcc's -isysroot. -D__CLANG_TIDY__ disables
# FSP system.c's picolibc-only TLS path (picotls.h / _init_tls / _set_tls), which
# is absent from this newlib sysroot; this matches what the gcc build does.
CFLAGS = """\
  --sysroot=/opt/arm-none-eabi-gcc-11.2.0/arm-bare_newlib_cortex_m4f_nommu-eabihf \
  -Wall -mlittle-endian -mthumb -mcpu=cortex-m4 -mfloat-abi=hard -mfpu=fpv4-sp-d16 -mno-unaligned-access --std=gnu11 \
  -ffunction-sections -fdata-sections -Woverride-init -fno-short-enums \
  -D__CLANG_TIDY__ -flto"""

# Constants for application
MAC = "fe:e3:a9:97:ad:ab"
IP_V4 = "192.168.69.100/24"
IP_V4_GATEWAY = "192.168.69.1"
IP_V6 = "fdaa:0000:0000:0000:0000:0000:0000:100/64"
IP_V6_GATEWAY = "fdaa:0000:0000:0000:0000:0000:0000:1"
MQTT_CLIENT_ID = "rtic"
MQTT_BROKER_IP = "192.168.69.20"
MQTT_BROKER_PORT_TLS = "8883"
MQTT_BROKER_PORT_TCP = "1883"

[target.thumbv7em-none-eabihf]
rustflags = [
  "-C", "target-cpu=cortex-m4",

  # Emit LLVM bitcode from rustc so the linker's LTO can optimize across the
  # Rust/C boundary.
  "-C", "linker-plugin-lto",

  # Force-keep the peripheral interrupt vector table. `__INTERRUPTS` (ra6m3-fsp-pac)
  # is a #[no_mangle] static with no #[used]; nothing in the IR references it (the
  # hardware reads it via the NVIC), so LTO's internalize+globaldce drop it before
  # the linker script's KEEP(.application_vectors) can protect it. --undefined makes
  # it an LTO root. Without this, every peripheral IRQ vectors to a fill word and
  # traps into Default_Handler -> BSP_CFG_HANDLE_UNRECOVERABLE_ERROR.
  "-C", "link-arg=-Wl,--undefined=__INTERRUPTS",

  # Drive the final link through arm-none-eabi-gcc (it finds the newlib crt and
  # libgcc), but force ld.lld via the -B shim. lld understands LLVM bitcode and
  # performs the cross-language LTO; bfd ld would not.
  "-C", "linker=/opt/arm-none-eabi-gcc-11.2.0/bin/arm-bare_newlib_cortex_m4f_nommu-eabihf-gcc",
  "-C", "link-arg=-B/home/ddystopia/code/ra6m3-rtic/script/lld-shim",

  # Linker script
  "-C", "link-arg=-Tra-fsp-sys.x",

  # in cmake there is no -nodefaultlibs
  "-C", "default-linker-libraries=yes",

  "-C", "link-arg=--sysroot=/opt/arm-none-eabi-gcc-11.2.0/arm-bare_newlib_cortex_m4f_nommu-eabihf",
  "-C", "link-arg=-mlittle-endian",
  "-C", "link-arg=-mthumb",
  "-C", "link-arg=-mcpu=cortex-m4",
  "-C", "link-arg=-mfloat-abi=hard",
  "-C", "link-arg=-mfpu=fpv4-sp-d16",
  "-C", "link-arg=-mno-unaligned-access",
  "-C", "link-arg=-gdwarf-4",
  "-C", "link-arg=-Wl,--build-id=none", # important!! .text is misplaced by 24 bytes if not set
]
