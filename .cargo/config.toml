# Toolchain selection: switch this between ../env.llvm.toml (clang/lld + LTO) and
# ../env.gcc.toml (arm-none-eabi-gcc). Each env file is self-contained: it carries
# the [env] toolchain vars AND the [target] linker rustflags.
include = ["../env.llvm.toml"]
# include = ["../env.gcc.toml"]

[build]
target = "thumbv7em-none-eabihf"

# [unstable]
# build-std = ["core", "panic_abort"]
# build-std-features = ["optimize_for_size", "panic_immediate_abort"]

[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip R7FA6M3AH"
# rustflags come from the included env file (gcc vs llvm differ in linker).
